groups:
  - name: kuva-notifications-alerts
    rules:
      - alert: HighNotificationFailureRate
        expr: rate(kuva_notifications_failed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alta taxa de falha no envio de notificacoes"
          description: "O microservico Kuva.Notifications esta apresentando falhas acima do esperado."

      - alert: NotificationsServiceDown
        expr: up{job="kuva-notifications-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kuva.Notifications indisponivel"
          description: "Prometheus nao consegue coletar metricas do Kuva.Notifications."
