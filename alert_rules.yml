groups:
  - name: kuva-email-alerts
    rules:
      - alert: HighEmailFailureRate
        expr: rate(kuva_email_failed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alta taxa de falha no envio de e-mails"
          description: "O microservico Kuva.Email esta apresentando falhas acima do esperado."

      - alert: EmailServiceDown
        expr: up{job="kuva-email-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kuva.Email indisponivel"
          description: "Prometheus nao consegue coletar metricas do Kuva.Email."
